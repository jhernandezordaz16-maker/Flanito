<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ruleta Flanes</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#fff5e6;
    text-align:center;
    padding:20px;
}
h2{
    color:#8d4b20;
}
.wheel-wrapper {
    position: relative;
    width: 300px;
    margin: 0 auto;
}
canvas{
    width: 100%;
    max-width:300px;
    border-radius:50%;
    border:8px solid #8d4b20;
    box-shadow:0 0 15px #aaa;
}
.pointer{
    font-size:45px;
    margin-bottom: -10px;
    position: relative;
    z-index: 10;
}
.btn{
    padding:12px 30px;
    font-size:18px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top: 15px;
}
.btn:hover{
    background:#f57c00;
}
#result{
    display:none;
    margin-top:20px;
    padding:15px;
    border:2px dashed #4caf50;
    background:#eef;
    border-radius:10px;
    max-width: 300px;
    margin-left: auto;
    margin-right: auto;
}
</style>
</head>
<body>

<h2>🍮 ¡Gira la ruleta!</h2>

<div class="pointer">⬇️</div>

<div class="wheel-wrapper">
    <canvas id="wheel" width="300" height="300"></canvas>
</div>

<button id="spin" class="btn">GIRAR</button>

<div id="result"></div>

<script>
const sectors=[
    {text:"SIGUE PARTICIPANDO",c:"#ddd",w:50},
    {text:"10% DESC.",c:"#ffe082",w:25},
    {text:"15% DESC.",c:"#ffd54f",w:15},
    {text:"20% DESC.",c:"#ffca28",w:7},
    {text:"50% DESC.",c:"#ffb74d",w:2},
    {text:"FLAN GRATIS",c:"#ff8a65",w:1}
];

const cv=document.getElementById("wheel");
const ctx=cv.getContext("2d");

function draw(){
    let start = 0;
    for(let s of sectors){
        let angle = (s.w / 100) * Math.PI * 2;

        ctx.beginPath();
        ctx.moveTo(150,150);
        ctx.fillStyle=s.c;
        ctx.arc(150,150,140,start,start+angle);
        ctx.fill();
        ctx.lineWidth = 1;
        ctx.strokeStyle = "#fff";
        ctx.stroke();

        ctx.save();
        ctx.translate(150,150);
        ctx.rotate(start + angle / 2);
        ctx.fillStyle="#000";
        ctx.textAlign="right";
        ctx.textBaseline="middle";
        
        if(s.w < 5) {
            ctx.font="bold 8px Arial";
        } else if(s.w < 10) {
            ctx.font="bold 9px Arial";
        } else {
            ctx.font="bold 11px Arial";
        }
        
        ctx.fillText(s.text, 135, 0);
        ctx.restore();

        start += angle;
    }
}

draw();

const key="flanPremio";

if(localStorage.getItem(key)){
    mostrar(JSON.parse(localStorage.getItem(key)));
    document.getElementById("spin").style.display="none";
}

function elegir(){
    let r=Math.random()*100;
    let suma=0;
    for(let p of sectors){
        suma+=p.w;
        if(r<suma) return p;
    }
}

document.getElementById("spin").onclick=()=>{
    if(localStorage.getItem(key)) return;

    let p=elegir();

    let posicionAcumuladaGrados = 0;
    for(let s of sectors){
        if(s===p) break;
        posicionAcumuladaGrados += (s.w / 100) * 360;
    }

    let arcoPremioGrados = (p.w / 100) * 360;
    let centroPremioGrados = posicionAcumuladaGrados + (arcoPremioGrados / 2);

    let anguloDestino = 270 - centroPremioGrados;
    let gradosTotalesAGirar = 1800 + anguloDestino;

    cv.style.transition="transform 4s cubic-bezier(0.15, 0.85, 0.35, 1)";
    cv.style.transform=`rotate(${gradosTotalesAGirar}deg)`;

    setTimeout(()=>{
        let code="FLAN-"+Math.random().toString(36).substring(2,6).toUpperCase()+"-"+Date.now().toString().slice(-4);

        let data={
            premio:p.text,
            codigo:code,
            fecha:new Date().toLocaleString()
        };

        localStorage.setItem(key,JSON.stringify(data));
        mostrar(data);
        document.getElementById("spin").style.display="none";
    }, 4000);
};

function mostrar(d){
    let r=document.getElementById("result");
    r.style.display="block";
    
    // Validar si es la opción sin premio
    if(d.premio === "SIGUE PARTICIPANDO") {
        r.style.borderColor = "#c62828"; // Borde rojo tenue para la derrota
        r.style.background = "#ffebee";
        r.innerHTML=
        "<h3>😢 Lo sentimos, sigue participando 😢</h3>"+
        "<p><b>Código:</b> "+d.codigo+
        "<br><b>Fecha:</b> "+d.fecha+
        "</p>"+
        "<small>Este dispositivo ya utilizó su oportunidad.</small>";
    } else {
        r.style.borderColor = "#4caf50"; // Verde para los ganadores
        r.style.background = "#eef";
        r.innerHTML=
        "<h3>🎉 ¡Ganaste: "+d.premio+"! 🎉</h3>"+
        "<p><b>Código:</b> "+d.codigo+
        "<br><b>Fecha:</b> "+d.fecha+
        "</p>"+
        "<small>Este dispositivo ya utilizó su oportunidad.</small>";
    }
}
</script>

</body>
</html>
